version: "3.9"

services:
  nginx:
    image: nginx:1.26-alpine
    container_name: fundabiz-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/rate-limit.conf:/etc/nginx/rate-limit.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - gateway
      - web
    restart: unless-stopped

  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /data/postgres:/var/lib/postgresql/data

  redis:
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - /data/redis:/data

  rabbitmq:
    restart: unless-stopped
    volumes:
      - /data/rabbitmq:/var/lib/rabbitmq

  pgbouncer:
    restart: unless-stopped

  gateway:
    restart: unless-stopped
    deploy:
      replicas: 2

  auth:
    restart: unless-stopped
    deploy:
      replicas: 2

  loan:
    restart: unless-stopped

  escrow:
    restart: unless-stopped

  wallet:
    restart: unless-stopped

  mpesa:
    restart: unless-stopped

  kyc:
    restart: unless-stopped

  fraud:
    restart: unless-stopped

  notification:
    restart: unless-stopped

  repayment:
    restart: unless-stopped

  tracking:
    restart: unless-stopped

  ussd:
    restart: unless-stopped

  web:
    restart: unless-stopped
    deploy:
      replicas: 2
