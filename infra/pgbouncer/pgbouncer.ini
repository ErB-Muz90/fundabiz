[databases]
fundabiz = host=postgres port=5432 dbname=fundabiz

[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
auth_user = fundabiz

# Connection pooling
pool_mode = transaction
max_client_conn = 200
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 10
reserve_pool_timeout = 5.0

# Timeouts
server_idle_timeout = 600
server_lifetime = 3600
server_connect_timeout = 15
query_timeout = 30
query_wait_timeout = 120
client_idle_timeout = 600
client_login_timeout = 60
idle_transaction_timeout = 300

# Resource management
max_db_connections = 100
max_user_connections = 100

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60
verbose = 0

# Tuning
pkt_buf = 4096
listen_backlog = 128
sbuf_loopcnt = 5
suspend_timeout = 10
tcp_defer_accept = 1
tcp_keepalive = 1
tcp_keepcnt = 9
tcp_keepidle = 3600
tcp_keepintvl = 75
