apiVersion: apps/v1
kind: Deployment
metadata:
  name: mpesa
  namespace: fundabiz
  labels:
    app: mpesa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mpesa
  template:
    metadata:
      labels:
        app: mpesa
    spec:
      containers:
        - name: mpesa
          image: fundabiz/mpesa:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4005
              protocol: TCP
          envFrom:
            - secretRef:
                name: fundabiz-secrets
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /mpesa/callback
              port: 4005
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /mpesa/callback
              port: 4005
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
