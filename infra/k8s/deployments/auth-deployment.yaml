apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: fundabiz
  labels:
    app: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: fundabiz/auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
              protocol: TCP
          envFrom:
            - secretRef:
                name: fundabiz-secrets
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /auth/login
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /auth/login
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
