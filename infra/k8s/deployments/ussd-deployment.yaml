apiVersion: apps/v1
kind: Deployment
metadata:
  name: ussd
  namespace: fundabiz
  labels:
    app: ussd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ussd
  template:
    metadata:
      labels:
        app: ussd
    spec:
      containers:
        - name: ussd
          image: fundabiz/ussd:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4011
              protocol: TCP
          envFrom:
            - secretRef:
                name: fundabiz-secrets
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /ussd
              port: 4011
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ussd
              port: 4011
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
